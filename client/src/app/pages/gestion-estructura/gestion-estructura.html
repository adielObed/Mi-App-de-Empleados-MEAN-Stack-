<div class="container animate-fadeIn">
  <mat-card class="form-card mat-elevation-z8">
    <mat-card-header>
      <mat-card-title>
        <mat-icon>{{ estaEditando ? 'edit' : 'add_business' }}</mat-icon>
        {{ estaEditando ? 'Editar Área' : 'Nueva Área Organizacional' }}
      </mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <form [formGroup]="formularioDepto" (ngSubmit)="alEnviar()" class="dept-form">
        <div class="form-grid">
          <mat-form-field appearance="outline">
            <mat-label>Código del Departamento</mat-label>
            <input matInput formControlName="codigo" type="number" placeholder="Ej. 10">
            <mat-error *ngIf="formularioDepto.get('codigo')?.hasError('required')">Requerido</mat-error>
          </mat-form-field>
          <mat-form-field appearance="outline">
            <mat-label>Nombre del Área</mat-label>
            <input matInput formControlName="nombre" placeholder="Ej. Recursos Humanos">
            <mat-error *ngIf="formularioDepto.get('nombre')?.hasError('required')">Requerido</mat-error>
          </mat-form-field>
        </div>
        <div class="form-actions">
          <button mat-flat-button color="primary" type="submit" [disabled]="formularioDepto.invalid">
            <mat-icon>{{ estaEditando ? 'save' : 'add' }}</mat-icon>
            {{ estaEditando ? 'ACTUALIZAR' : 'CREAR ÁREA' }}
          </button>
          <button mat-stroked-button color="warn" type="button" (click)="limpiarFormulario()" *ngIf="estaEditando">
            CANCELAR
          </button>
        </div>
      </form>
    </mat-card-content>
  </mat-card>
  <mat-card class="table-card mat-elevation-z8">
    <mat-card-header>
      <mat-card-title>Estructura Administrativa</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <table mat-table [dataSource]="departamentos" class="full-width-table">
        <ng-container matColumnDef="codigo">
          <th mat-header-cell *matHeaderCellDef> ID </th>
          <td mat-cell *matCellDef="let element"> {{element.codigo}} </td>
        </ng-container>
        <ng-container matColumnDef="nombre">
          <th mat-header-cell *matHeaderCellDef> Departamento </th>
          <td mat-cell *matCellDef="let element"> {{element.nombre}} </td>
        </ng-container>
        <ng-container matColumnDef="acciones">
          <th mat-header-cell *matHeaderCellDef> Acciones </th>
          <td mat-cell *matCellDef="let element">
            <button mat-icon-button color="accent" (click)="editarDepto(element)">
              <mat-icon>edit</mat-icon>
            </button>
            <button mat-icon-button color="warn" (click)="eliminarDepto(element.codigo)">
              <mat-icon>delete</mat-icon>
            </button>
          </td>
        </ng-container>
        <tr mat-header-row *matHeaderRowDef="columnasMostradas"></tr>
        <tr mat-row *matRowDef="let row; columns: columnasMostradas;" class="animate-row"></tr>
      </table>
    </mat-card-content>
  </mat-card>
</div>
